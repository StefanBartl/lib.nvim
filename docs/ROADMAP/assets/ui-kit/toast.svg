<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="ui-sans-serif, Segoe UI, Roboto, sans-serif">
  <rect width="720" height="360" rx="10" fill="#f7f6f2"/>
  <text x="360" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#4a4640">toast template — stacked corner notifications</text>

  <!-- faint editor -->
  <rect x="40" y="56" width="640" height="272" rx="6" fill="#efede7" stroke="#e0ddd3" stroke-width="2"/>

  <!-- toast stack, top-right, fading downward -->
  <!-- info -->
  <g>
    <rect x="428" y="74" width="234" height="46" rx="5" fill="#ffffff" stroke="#1f2430" stroke-width="2"/>
    <rect x="428" y="74" width="6" height="46" rx="3" fill="#5aa0e0"/>
    <rect x="448" y="88" width="150" height="7" rx="2" fill="#8a8478"/>
    <rect x="448" y="102" width="110" height="6" rx="2" fill="#cfcabd"/>
  </g>
  <!-- warn -->
  <g opacity="0.82">
    <rect x="428" y="128" width="234" height="46" rx="5" fill="#ffffff" stroke="#1f2430" stroke-width="2"/>
    <rect x="428" y="128" width="6" height="46" rx="3" fill="#e0a520"/>
    <rect x="448" y="142" width="130" height="7" rx="2" fill="#8a8478"/>
    <rect x="448" y="156" width="94" height="6" rx="2" fill="#cfcabd"/>
  </g>
  <!-- error, fading -->
  <g opacity="0.6">
    <rect x="428" y="182" width="234" height="46" rx="5" fill="#ffffff" stroke="#1f2430" stroke-width="2"/>
    <rect x="428" y="182" width="6" height="46" rx="3" fill="#d9534f"/>
    <rect x="448" y="196" width="160" height="7" rx="2" fill="#8a8478"/>
    <rect x="448" y="210" width="120" height="6" rx="2" fill="#cfcabd"/>
  </g>

  <text x="360" y="330" text-anchor="middle" font-size="12" fill="#9a948a">no focus steal · auto-dismiss · severity accent · a vim.notify companion</text>
</svg>
